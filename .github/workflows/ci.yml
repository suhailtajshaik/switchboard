name: CI

on:
  push:
    branches: [master, development]
  pull_request:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tooling
        run: pip install -r src/requirements-dev.txt
      - name: Lint
        run: ruff check src tests
      - name: Conformance tests (spec §11, no live credentials)
        run: pytest tests/ -q
